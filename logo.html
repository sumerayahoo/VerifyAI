<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VerifyAI Logo Animation</title>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="logo.css">
</head>
<body>

  <div class="stage">
    <div class="logo-wrap" id="logoWrap">

      <!-- V icon -->
      <div class="v-container">
        <div class="v-sweep" id="sweep"></div>
        <div class="v-glyph">
          <svg class="v-svg" viewBox="0 0 90 110" xmlns="http://www.w3.org/2000/svg">
            <text
              x="45"
              y="98"
              text-anchor="middle"
              font-family="UnifrakturMaguntia, serif"
              font-size="104"
              fill="#ffffff"
            >v</text>
          </svg>
        </div>
      </div>

      <!-- Wordmark -->
      <div class="wordmark" id="wordmark">
        <div class="wordmark-inner">
          <span class="word-verify">Verify</span><span class="word-ai">AI</span>
        </div>
      </div>

    </div>
  </div>



  <script src="logo.js"></script>

</body>
</html>
